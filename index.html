// ── GQ ID（UID固定・1アカウント1ID）──────────────────────
function makeGQId(uid){return"GQ-"+uid.slice(0,6).toUpperCase();}

// ── Firestoreのゲームデータフィールド ────────────────────
// usersドキュメントに保存するゲームデータのキー一覧
const GAME_FIELDS=["totalXP","partXP","exercises","sessions","totalSessions","maxStreak","level","totalProtein","nightRecord","morningRecord","noonRecord","prCount","totalSets","maxWeight","maxDailySessions","workoutLog","menuRecords"];

// ── ユーザードキュメント保証＆データ復元 ─────────────────
// 戻り値: { userData, gameData }
async function loadUserFromFirestore(uid){
  const ref=doc(db,"users",uid);
  const snap=await getDoc(ref);
  const gqId=makeGQId(uid);

  if(!snap.exists()){
    // 新規ユーザー
    const newDoc={
      uid,gqId,gorillaName:"ゴリラ",
      xp:0,bananas:100,resetAt:null,
      createdAt:serverTimestamp(),
      // ゲームデータ初期値
      totalXP:0,partXP:{},exercises:{},sessions:[],
      totalSessions:0,maxStreak:0,level:1,totalProtein:0,
      nightRecord:false,morningRecord:false,noonRecord:false,
      prCount:0,totalSets:0,maxWeight:0,maxDailySessions:0,
      workoutLog:[],menuRecords:0
    };
    await setDoc(ref,newDoc);
    return{userData:newDoc,gameData:buildGameData(newDoc)};
  }

  const d=snap.data();
  return{
    userData:d,
    gameData:buildGameData(d)
  };
}

// Firestoreドキュメントからゲームデータを抽出（friends/menus含む）
function buildGameData(d){
  return{
    totalXP:d.totalXP||0,
    partXP:d.partXP||{},
    exercises:d.exercises||{},
    sessions:d.sessions||[],
    totalSessions:d.totalSessions||0,
    maxStreak:d.maxStreak||0,
    level:d.level||1,
    totalProtein:d.totalProtein||0,
    nightRecord:d.nightRecord||false,
    morningRecord:d.morningRecord||false,
    noonRecord:d.noonRecord||false,
    prCount:d.prCount||0,
    totalSets:d.totalSets||0,
    maxWeight:d.maxWeight||0,
    maxDailySessions:d.maxDailySessions||0,
    workoutLog:d.workoutLog||[],
    menuRecords:d.menuRecords||0,
    friends:d.friends||[],
    menus:d.menus||DEFAULT_MENUS
  };
}

// ── バトルスコア更新 ──────────────────────────────────────
async function syncBattleScore(uid,currentTotalXP){
  try{
    const q1=query(collection(db,"battles"),where("challengerId","==",uid),where("status","==","active"));
    const q2=query(collection(db,"battles"),where("opponentId","==",uid),where("status","==","active"));
    const[s1,s2]=await Promise.all([getDocs(q1),getDocs(q2)]);
    const updates=[];
    s1.forEach(d=>{const base=d.data().challengerBaseXP||0;updates.push(updateDoc(doc(db,"battles",d.id),{challengerScore:Math.max(0,currentTotalXP-base)}));});
    s2.forEach(d=>{const base=d.data().opponentBaseXP||0;updates.push(updateDoc(doc(db,"battles",d.id),{opponentScore:Math.max(0,currentTotalXP-base)}));});
    await Promise.all(updates);
  }catch(e){console.log("syncBattleScore err",e);}
}

// ── バトル終了処理（二重実行防止・報酬は1回のみ） ────────
async function finalizeBattle(battleId,battle){
  try{
    // まず現在のステータスを確認（二重処理防止）
    const snap=await getDoc(doc(db,"battles",battleId));
    if(!snap.exists()||snap.data().status==="finished")return;

    const cs=battle.challengerScore||0,os=battle.opponentScore||0;
    let winnerId="draw",loserId=null;
    if(cs>os){winnerId=battle.challengerId;loserId=battle.opponentId;}
    else if(os>cs){winnerId=battle.opponentId;loserId=battle.challengerId;}

    const batch=writeBatch(db);
    // バトルをfinishedに更新
    batch.update(doc(db,"battles",battleId),{
      status:"finished",
      winnerId:winnerId,
      endAt:Timestamp.fromDate(new Date())
    });
    // バナナ増減（引き分け時は変動なし）
    if(winnerId!=="draw"&&loserId){
      batch.update(doc(db,"users",winnerId),{bananas:increment(10)});
      batch.update(doc(db,"users",loserId),{bananas:increment(-5)});
    }
    await batch.commit();
  }catch(e){console.log("finalizeBattle err",e);}
}

function levelInfo(xp){var lv=1,rem=xp,needed=100;while(rem>=needed){rem-=needed;lv++;needed=Math.floor(needed*1.3);}return{level:lv,current:rem,needed};}
function partLevelInfo(xp){var lv=1,rem=xp,needed=50;while(rem>=needed){rem-=needed;lv++;needed=Math.floor(needed*1.4);}return{level:lv,current:rem,needed};}
function getToday(){return new Date().toISOString().slice(0,10);}
function getHour(){return new Date().getHours();}
function daysDiff(a,b){return Math.floor((new Date(b)-new Date(a))/86400000);}
function getStreak(dates){if(!dates.length)return 0;var uniq=[...new Set(dates)].sort().reverse();var s=1;for(var i=0;i<uniq.length-1;i++){if((new Date(uniq[i])-new Date(uniq[i+1]))/86400000===1)s++;else break;}return s;}
function getStage(lv){if(lv<3)return 0;if(lv<6)return 1;if(lv<10)return 2;if(lv<15)return 3;return 4;}
function fmtTime(ms){var m=Math.floor(ms/60000);var s=Math.floor((ms%60000)/1000);return m+"分"+("0"+s).slice(-2)+"秒";}
function fmtCd(endAt){
  if(!endAt)return"--:--";
  var end=endAt.toDate?endAt.toDate().getTime():endAt;
  var diff=Math.max(0,end-Date.now());
  var days=Math.floor(diff/86400000);
  var hours=Math.floor((diff%86400000)/3600000);
  var mins=Math.floor((diff%3600000)/60000);
  var secs=Math.floor((diff%60000)/1000);
  if(days>0)return days+"日 "+hours+"時間 "+mins+"分";
  if(hours>0)return hours+"時間 "+mins+"分 "+secs+"秒";
  return mins+"分 "+secs+"秒";
}
function getPartForEx(ex){var f="胸";Object.keys(PRESETS).forEach(p=>{if(PRESETS[p].includes(ex))f=p;});return f;}
function calcDegradePenalty(lastDate){if(!lastDate)return 0;var diff=daysDiff(lastDate,getToday());if(diff<3)return 0;if(diff===3)return 15;if(diff===4)return 23;return 30*(diff-4)+23;}
function rollRoulette(){var r=Math.random(),cum=0;for(var i=0;i<ROULETTE_TABLE.length;i++){cum+=ROULETTE_TABLE[i].prob;if(r<cum)return ROULETTE_TABLE[i];}return ROULETTE_TABLE[0];}

// ── ペンタゴンチャート ──────────────────────────────────
function PentagonChart({partXP={},size=140}){
  var cx=size/2,cy=size/2+8,r=size*0.30,labelR=r+22;
  var angles=PARTS.map((_,i)=>(i*72-90)*Math.PI/180);
  var pts=PARTS.map((p,i)=>{var lv=Math.min(partLevelInfo(partXP[p]||0).level,10);return[cx+r*(lv/10)*Math.cos(angles[i]),cy+r*(lv/10)*Math.sin(angles[i])];});
  var bgPts=angles.map(a=>[cx+r*Math.cos(a),cy+r*Math.sin(a)]);
  return h("svg",{width:size,height:size+10,style:{display:"block",overflow:"visible"}},
    h("polygon",{points:bgPts.map(p=>p.join(",")).join(" "),fill:"rgba(68,136,255,0.1)",stroke:"#4444aa",strokeWidth:1}),
    h("polygon",{points:pts.map(p=>p.join(",")).join(" "),fill:"rgba(255,221,0,0.25)",stroke:"#ffdd00",strokeWidth:2}),
    PARTS.map((p,i)=>{var lv=partLevelInfo(partXP[p]||0).level;var tx=cx+labelR*Math.cos(angles[i]),ty=cy+labelR*Math.sin(angles[i]);return h("g",{key:p},h("text",{x:tx,y:ty,textAnchor:"middle",dominantBaseline:"middle",fontSize:9,fill:PART_COLOR[p],style:{fontFamily:"'DotGothic16',monospace"}},p),h("text",{x:tx,y:ty+11,textAnchor:"middle",dominantBaseline:"middle",fontSize:9,fill:"#aaa",style:{fontFamily:"'DotGothic16',monospace"}},"L"+lv));})
  );
}

// ── バトルカード ──────────────────────────────────────────
function BattleCard({battle,currentUid,onFinalize}){
  var[cd,setCd]=useState("");
  var isC=battle.challengerId===currentUid;
  var myScore=isC?(battle.challengerScore||0):(battle.opponentScore||0);
  var oppScore=isC?(battle.opponentScore||0):(battle.challengerScore||0);
  var myName=isC?battle.challengerName:battle.opponentName;
  var oppName=isC?battle.opponentName:battle.challengerName;
  var total=myScore+oppScore;
  var myPct=total>0?Math.round(myScore/total*100):50;
  useEffect(()=>{
    if(battle.status!=="active"||!battle.endAt)return;
    function tick(){var end=battle.endAt.toDate?battle.endAt.toDate().getTime():battle.endAt;if(Date.now()>=end&&onFinalize)onFinalize(battle.id,battle);setCd(fmtCd(battle.endAt));}
    tick();var t=setInterval(tick,1000);return()=>clearInterval(t);
  },[battle]);
  var won=battle.status==="finished"&&battle.winnerId===currentUid;

  return h("div",{className:"dq-win",style:{padding:"10px",marginBottom:8}},

      h("span",{style:{fontSize:11,color:battle.status==="active"?"#44ff44":"#aaa"}},battle.status==="active"?"⚔ バトル中！":"🏁 しゅうりょう"),

    ),
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},

        h("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"rgba(255,255,255,0.7)",pointerEvents:"none"}},myPct+"% vs "+(100-myPct)+"%")
      )

  var touchStartY=useRef(0);

  var pullYRef=useRef(0);

  useEffect(()=>{
    function onTouchStart(e){
      if(window.scrollY===0)touchStartY.current=e.touches[0].clientY;
      else touchStartY.current=0;
    }
    function onTouchMove(e){
      if(!touchStartY.current)return;
      var dy=e.touches[0].clientY-touchStartY.current;
      if(dy>0&&window.scrollY===0){
        var clamped=Math.min(dy,120);
        pullingRef.current=true;
        pullYRef.current=clamped;
        setPulling(true);
        setPullY(clamped);
        if(dy>PULL_THRESHOLD)e.preventDefault();
      }else{
        pullingRef.current=false;
        pullYRef.current=0;
        setPulling(false);
        setPullY(0);
      }
    }
    function onTouchEnd(){
      if(pullingRef.current&&pullYRef.current>=PULL_THRESHOLD){
        setReloading(true);
        setTimeout(()=>window.location.reload(),400);
      }else{
        setPulling(false);
        setPullY(0);
      }
      pullingRef.current=false;
      pullYRef.current=0;
      touchStartY.current=0;
    }
    document.addEventListener("touchstart",onTouchStart,{passive:true});
    document.addEventListener("touchmove",onTouchMove,{passive:false});
    document.addEventListener("touchend",onTouchEnd,{passive:true});
    return()=>{
      document.removeEventListener("touchstart",onTouchStart);
      document.removeEventListener("touchmove",onTouchMove);
      document.removeEventListener("touchend",onTouchEnd);
    };

    var u1=onSnapshot(query(collection(db,"battles"),where("challengerId","==",authUser.uid)),s=>{s.docs.forEach(d=>{map[d.id]={id:d.id,...d.data()};});refresh();});
    var u2=onSnapshot(query(collection(db,"battles"),where("opponentId","==",authUser.uid)),s=>{s.docs.forEach(d=>{map[d.id]={id:d.id,...d.data()};});refresh();});
    return()=>{u1();u2();};

    setMenus(m);
    try{localStorage.setItem(MK,JSON.stringify(m));}catch(e){}

  // ── XP記録 ──────────────────────────────────────────────
  function applyXP(d0,xpList,mult=1){

    var d={...d0},ns=[...d.sessions],totalXP=d.totalXP,partXP={...d.partXP},exercises={...d.exercises};

      ):null
    ):null,

    // ── FRIENDS + BATTLE ─────────────────────────────────
    tab==="friends"?h("div",null,
      // 自分のID
      h("div",{className:"dq-win",style:{padding:"10px 12px",marginBottom:8}},
        h("div",{style:{fontSize:11,color:"#aaa",marginBottom:4}},"▼ じぶんのID"),
        h("div",{style:{display:"flex",alignItems:"center",gap:8,justifyContent:"center"}},
          h("div",{style:{fontSize:14,color:"#4488ff",letterSpacing:2}},gqId),
          h("button",{className:"dq-btn",onClick:()=>navigator.clipboard?.writeText(gqId).then(()=>alert("コピーしました！")),style:{fontSize:11,padding:"4px 10px",color:"#ffdd00",border:"1px solid #ffdd00"}},"コピー")
        ),
        h("div",{style:{fontSize:10,color:"#666688",textAlign:"center",marginTop:4}},"このIDをともだちにおしえよう")
      ),
      // セクションA：進行中バトル
      battles.filter(b=>b.status==="active").length>0?h("div",{className:"dq-win",style:{padding:"10px 12px",marginBottom:8}},
        h("div",{style:{fontSize:11,color:"#ff6666",marginBottom:8}},"▼ ⚔ バトル中"),
        battles.filter(b=>b.status==="active").map(b=>h(BattleCard,{key:b.id,battle:b,currentUid:authUser?.uid,onFinalize:handleFinalize}))
      ):null,
      // フレンド検索
      h("div",{className:"dq-win",style:{padding:"10px 12px",marginBottom:8}},
        h("div",{style:{fontSize:11,color:"#aaa",marginBottom:6}},"▼ ともだちをけんさく"),
        h("div",{style:{display:"flex",gap:6,marginBottom:8}},
          h("input",{className:"dq-input",value:friendSearch,onChange:e=>setFriendSearch(e.target.value),onCompositionEnd:e=>setFriendSearch(e.target.value),placeholder:"GQ-XXXXXX",style:{flex:1,fontSize:13}}),
          h("button",{className:"dq-btn",onClick:handleFriendSearch,style:{padding:"6px 12px",color:"#ffdd00",border:"2px solid #ffdd00",fontSize:12}},friendLoading?"…":"けんさく")
        ),
        friendResult&&friendResult!=="notfound"?h("div",{className:"dq-win",style:{padding:"10px",borderColor:"#4488ff"}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            h("div",null,h("div",{style:{fontSize:13,color:"#ffdd00"}},friendResult.gorillaName||"ゴリラ"),h("div",{style:{fontSize:11,color:"#aaa"}},"LV"+(friendResult.level||1))),
            h("button",{className:"dq-btn",onClick:()=>addFriend(friendResult.gqId,friendResult),style:{fontSize:12,padding:"6px 10px",color:"#44ff44",border:"2px solid #44ff44"}},"＋ついか")
          ),
          h("div",{style:{display:"flex",justifyContent:"center"}},h(PentagonChart,{partXP:friendResult.partXP||{},size:150}))
        ):null,
        friendResult==="notfound"?h("div",{style:{fontSize:12,color:"#ff4444"}},"みつかりませんでした"):null
      ),
      // フレンドリスト
      friends.length>0?h("div",null,
        h("div",{style:{fontSize:11,color:"#aaa",marginBottom:6}},"▼ ともだちリスト ("+friends.length+"人)"),
        friends.map(fid=>{
          var fd=friendDetails[fid];
          if(!fd)return h("div",{key:fid,className:"dq-win",style:{padding:"10px",marginBottom:8,color:"#aaa",fontSize:12}},"ID: "+fid+" (よみこみ中...)");
          var ab=getActiveBattle(fid);
          return h(FriendCard,{key:fid,fd,fid,onRemove:()=>removeFriend(fid),battleStatus:ab?"active":null,onBattle:()=>handleBattleRequest(fid,fd.gorillaName||"ゴリラ",fd.uid)});
        })
      ):h("div",{style:{textAlign:"center",color:"#aaa",fontSize:12,padding:20}},"まだともだちがいません"),
      // セクションB：バトル履歴（最下部）
      battles.filter(b=>b.status==="finished").length>0?h("div",{className:"dq-win",style:{padding:"10px 12px",marginTop:8,marginBottom:8}},
        h("div",{style:{fontSize:11,color:"#aaa",marginBottom:6}},"▼ バトル履歴"),
        battles
          .filter(b=>b.status==="finished")
          .sort((a,b)=>{
            var at=a.endAt?.toDate?a.endAt.toDate().getTime():0;
            var bt=b.endAt?.toDate?b.endAt.toDate().getTime():0;
            return bt-at;
          })
          .map(b=>h(BattleHistoryCard,{key:b.id,battle:b,currentUid:authUser?.uid}))
      ):null
    ):null,

    h("div",{style:{height:24}})
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
