// Firebase ユーザードキュメントの作成・取得
async function ensureUserDoc(uid,gorillaName,gqId){
  const ref=doc(db,"users",uid);
  const snap=await getDoc(ref);
  if(!snap.exists()){
    await setDoc(ref,{uid,gorillaName:gorillaName||"ゴリラ",gqId:gqId||"GQ-??????",xp:0,bananas:100,createdAt:serverTimestamp()});
  }
  return(await getDoc(ref)).data();
}

// バトル中のXPをFirestoreに反映
async function syncBattleXP(uid,totalXP){
  try{
    // challengerとして参加中のバトル
    const q1=query(collection(db,"battles"),where("challengerId","==",uid),where("status","==","active"));
    const q2=query(collection(db,"battles"),where("opponentId","==",uid),where("status","==","active"));
    const [s1,s2]=await Promise.all([getDocs(q1),getDocs(q2)]);
    const updates=[];
    s1.forEach(d=>updates.push(updateDoc(doc(db,"battles",d.id),{challengerXP:totalXP})));
    s2.forEach(d=>updates.push(updateDoc(doc(db,"battles",d.id),{opponentXP:totalXP})));
    await Promise.all(updates);
  }catch(e){console.log("battle xp sync err",e);}
}

function levelInfo(xp){var lv=1,rem=xp,needed=100;while(rem>=needed){rem-=needed;lv++;needed=Math.floor(needed*1.3);}return{level:lv,current:rem,needed:needed};}
function partLevelInfo(xp){var lv=1,rem=xp,needed=50;while(rem>=needed){rem-=needed;lv++;needed=Math.floor(needed*1.4);}return{level:lv,current:rem,needed:needed};}

function getStreak(dates){if(!dates.length)return 0;var uniq=[...new Set(dates)].sort().reverse();var s=1;for(var i=0;i<uniq.length-1;i++){if((new Date(uniq[i])-new Date(uniq[i+1]))/86400000===1)s++;else break;}return s;}

function fmtTime(ms){var m=Math.floor(ms/60000);var s=Math.floor((ms%60000)/1000);return m+"分"+("0"+s).slice(-2)+"秒";}
function fmtCountdown(endAt){
  if(!endAt)return"--:--:--";
  var end=endAt.toDate?endAt.toDate().getTime():endAt;
  var diff=Math.max(0,end-Date.now());
  var d=Math.floor(diff/86400000);
  var hh=Math.floor((diff%86400000)/3600000);
  var mm=Math.floor((diff%3600000)/60000);
  var ss=Math.floor((diff%60000)/1000);
  if(d>0)return d+"日 "+hh+"時間 "+mm+"分";
  return("0"+hh).slice(-2)+":"+("0"+mm).slice(-2)+":"+("0"+ss).slice(-2);
}
function getPartForExercise(ex){var found="胸";Object.keys(PRESETS).forEach(function(p){if(PRESETS[p].indexOf(ex)>=0)found=p;});return found;}

function calcDegradePenalty(lastDate){if(!lastDate||lastDate==="なし")return 0;var diff=daysDiff(lastDate,getToday());if(diff<3)return 0;if(diff===3)return 15;if(diff===4)return 23;return 30*(diff-4)+23;}
function rollRoulette(){var r=Math.random();var cum=0;for(var i=0;i<ROULETTE_TABLE.length;i++){cum+=ROULETTE_TABLE[i].prob;if(r<cum)return ROULETTE_TABLE[i];}return ROULETTE_TABLE[0];}

// ── ペンタゴンチャート ──
function PentagonChart(props){
  var partXP=props.partXP||{};var size=props.size||140;
  var cx=size/2,cy=size/2+8,r=size*0.30;
  var angles=PARTS.map(function(_,i){return(i*72-90)*Math.PI/180;});
  var maxLv=10;
  var points=PARTS.map(function(p,i){var lv=Math.min(partLevelInfo(partXP[p]||0).level,maxLv);var ratio=lv/maxLv;return[cx+r*ratio*Math.cos(angles[i]),cy+r*ratio*Math.sin(angles[i])];});
  var bgPoints=angles.map(function(a){return[cx+r*Math.cos(a),cy+r*Math.sin(a)];});
  var labelR=r+22;
  return h("svg",{width:size,height:size+10,style:{display:"block",overflow:"visible"}},
    h("polygon",{points:bgPoints.map(function(p){return p.join(",");}).join(" "),fill:"rgba(68,136,255,0.1)",stroke:"#4444aa",strokeWidth:1}),
    h("polygon",{points:points.map(function(p){return p.join(",");}).join(" "),fill:"rgba(255,221,0,0.25)",stroke:"#ffdd00",strokeWidth:2}),
    PARTS.map(function(p,i){
      var lv=partLevelInfo(partXP[p]||0).level;
      var tx=cx+labelR*Math.cos(angles[i]);var ty=cy+labelR*Math.sin(angles[i]);
      return h("g",{key:p},h("text",{x:tx,y:ty,textAnchor:"middle",dominantBaseline:"middle",fontSize:9,fill:PART_COLOR[p],style:{fontFamily:"'DotGothic16',monospace"}},p),h("text",{x:tx,y:ty+11,textAnchor:"middle",dominantBaseline:"middle",fontSize:9,fill:"#aaa",style:{fontFamily:"'DotGothic16',monospace"}},"L"+lv));
    })

}

// ── ルーレット ──
