<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a1a;color:#fff;font-family:'DotGothic16',monospace;min-height:100vh;}
button,select{font-family:'DotGothic16',monospace;}
select{appearance:none;-webkit-appearance:none;}
.dq-win{background:#000033;border:3px solid #fff;box-shadow:inset 0 0 0 1px #000066;}
.dq-btn{background:#000033;border:2px solid #fff;color:#fff;cursor:pointer;padding:8px 12px;font-size:14px;text-align:left;transition:background 0.1s;font-family:'DotGothic16',monospace;}
.dq-btn:hover{background:#000066;}
.dq-btn.active{background:#000066;color:#ffdd00;}
@keyframes levelup{0%{opacity:0;transform:scale(0.8)}20%{opacity:1;transform:scale(1.05)}80%{opacity:1}100%{opacity:0}}
@keyframes xpPop{0%{opacity:0;transform:translateY(0)}20%{opacity:1;transform:translateY(-8px)}80%{opacity:1;transform:translateY(-20px)}100%{opacity:0;transform:translateY(-32px)}}
@keyframes flash{0%,100%{opacity:0}50%{opacity:0.7}}
@keyframes badgePop{0%{opacity:0;transform:translateY(20px)}15%{opacity:1;transform:translateY(0)}80%{opacity:1}100%{opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
</style>

function levelInfo(xp){var lv=1,rem=xp,needed=100;while(rem>=needed){rem-=needed;lv++;needed=Math.floor(needed*1.3);}return{level:lv,current:rem,needed:needed};}
function partLevelInfo(xp){var lv=1,rem=xp,needed=50;while(rem>=needed){rem-=needed;lv++;needed=Math.floor(needed*1.4);}return{level:lv,current:rem,needed:needed};}
function getToday(){return new Date().toISOString().slice(0,10);}
function getHour(){return new Date().getHours();}
function getStreak(dates){
  if(!dates.length)return 0;
  var uniq=[...new Set(dates)].sort().reverse();
  var s=1;
  for(var i=0;i<uniq.length-1;i++){if((new Date(uniq[i])-new Date(uniq[i+1]))/86400000===1)s++;else break;}
  return s;
}
function getStage(lv){if(lv<3)return 0;if(lv<6)return 1;if(lv<10)return 2;if(lv<15)return 3;return 4;}
function fmtTime(ms){var m=Math.floor(ms/60000);var s=Math.floor((ms%60000)/1000);return m+"分"+s+"秒";}

// ── components ──
function DQBar(props){
  var pct=Math.min(Math.round((props.value/props.max)*100),100);
  return h("div",{style:{width:props.width||"100%",height:10,background:"#001100",border:"1px solid #336633",display:"inline-block",verticalAlign:"middle"}},
    h("div",{style:{height:"100%",width:pct+"%",background:props.color,transition:"width 0.4s"}})
  );
}
function Stepper(props){
  var value=props.value,onChange=props.onChange,step=props.step||5,min=props.min||0;
  return h("div",{style:{display:"flex",alignItems:"center"}},
    h("button",{className:"dq-btn",onClick:function(){onChange(Math.max(min,value-step));},style:{width:36,textAlign:"center",padding:"6px",fontSize:16}},"◀"),
    h("span",{style:{flex:1,textAlign:"center",fontSize:14,color:"#ffdd00",background:"#000011",padding:"6px 0",border:"2px solid #4444aa",borderLeft:"none",borderRight:"none"}},value),
    h("button",{className:"dq-btn",onClick:function(){onChange(value+step);},style:{width:36,textAlign:"center",padding:"6px",fontSize:16}},"▶")
  );
}
function LevelUpOverlay(props){
  useEffect(function(){var t=setTimeout(props.onDone,2800);return function(){clearTimeout(t);};},[]);
  return h("div",{style:{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}},
    h("div",{style:{animation:"flash 0.3s ease 2",background:"rgba(255,255,100,0.12)",position:"absolute",inset:0}}),
    h("div",{className:"dq-win",style:{padding:"20px 32px",textAlign:"center",animation:"levelup 2.8s ease forwards",border:"4px solid #ffdd00"}},
      h("div",{style:{fontSize:13,color:"#ffdd00",marginBottom:8}},"✦ ✦ ✦"),
      h("div",{style:{fontSize:18,color:"#ffdd00",lineHeight:1.8}},"レベルが あがった！",h("br"),h("span",{style:{fontSize:24,color:"#fff"}},"Lv."+props.level)),
      h("div",{style:{fontSize:13,color:"#ffdd00",marginTop:8}},"✦ ✦ ✦")
    )
  );
}
function XPPop(props){
  useEffect(function(){var t=setTimeout(props.onDone,1400);return function(){clearTimeout(t);};},[]);
  return h("div",{style:{position:"fixed",top:"30%",left:"50%",transform:"translateX(-50%)",zIndex:900,pointerEvents:"none",animation:"xpPop 1.4s ease forwards",fontSize:20,color:"#ffdd00",textShadow:"0 0 8px #ffdd00"}},"＋"+props.xp+"XP");

function BadgePop(props){

      h("div",{style:{fontSize:11,color:"#aaa",marginTop:2}},props.badge.desc)
    )
  );

// ── camera modal ──
function CameraModal(props){
  var videoRef=useRef(null);
  var canvasRef=useRef(null);
  var _s=useState(false);var streaming=_s[0];var setStreaming=_s[1];
  var streamRef=useRef(null);

  useEffect(function(){
    navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false})
      .then(function(stream){
        streamRef.current=stream;
        if(videoRef.current){videoRef.current.srcObject=stream;videoRef.current.play();}
        setStreaming(true);
      })
      .catch(function(e){alert("カメラの起動に失敗しました: "+e.message);props.onClose();});
    return function(){
      if(streamRef.current) streamRef.current.getTracks().forEach(function(t){t.stop();});
    };
  },[]);

  function shoot(){
    if(!canvasRef.current||!videoRef.current) return;
    var v=videoRef.current;
    canvasRef.current.width=v.videoWidth;
    canvasRef.current.height=v.videoHeight;
    canvasRef.current.getContext("2d").drawImage(v,0,0);
    var dataUrl=canvasRef.current.toDataURL("image/jpeg",0.6);
    if(streamRef.current) streamRef.current.getTracks().forEach(function(t){t.stop();});
    props.onPhoto(dataUrl);
  }

  return h("div",{style:{position:"fixed",inset:0,zIndex:2000,background:"#000",display:"flex",flexDirection:"column"}},
    h("div",{style:{padding:"12px",textAlign:"center",color:"#ffdd00",fontSize:14,background:"#000033",border:"none"}},"★ トレーニング開始 ★"),
    h("div",{style:{fontSize:11,color:"#aaa",textAlign:"center",padding:"4px"}},"ジムの様子を撮影してください"),
    h("video",{ref:videoRef,autoPlay:true,playsInline:true,style:{flex:1,width:"100%",objectFit:"cover"}}),
    h("canvas",{ref:canvasRef,style:{display:"none"}}),
    h("div",{style:{padding:"16px",display:"flex",gap:12,background:"#000033"}},
      h("button",{className:"dq-btn",onClick:props.onClose,style:{flex:1,textAlign:"center",padding:"12px",color:"#ff4444",border:"2px solid #ff4444"}},"▶ とじる"),
      streaming?h("button",{className:"dq-btn",onClick:shoot,style:{flex:2,textAlign:"center",padding:"12px",color:"#ffdd00",border:"3px solid #ffdd00",fontSize:16}},"📷 さつえい！"):
      h("div",{style:{flex:2,textAlign:"center",padding:"12px",color:"#aaa",fontSize:12}},"カメラ起動中...")
    )
  );
}

// ── main ──
var INIT={totalXP:0,partXP:{},exercises:{},sessions:[],badges:[],totalSessions:0,maxStreak:0,level:1,totalProtein:0,nightRecord:false,morningRecord:false,noonRecord:false,prCount:0,totalSets:0,maxWeight:0,maxDailySessions:0,totalCheckIns:0,workoutLog:[]};
var SK="gorilla_quest_v3";

function App(){
  var s0=function(){try{return JSON.parse(localStorage.getItem(SK)||"null")||INIT;}catch(e){return INIT;}};
  var _d=useState(s0);var data=_d[0];var setData=_d[1];
  var _tab=useState("log");var tab=_tab[0];var setTab=_tab[1];
  var _pt=useState("胸");var part=_pt[0];var setPart=_pt[1];
  var _ex=useState(PRESETS["胸"][0]);var exercise=_ex[0];var setExercise=_ex[1];
  var _wt=useState(60);var weight=_wt[0];var setWeight=_wt[1];
  var _rp=useState(10);var reps=_rp[0];var setReps=_rp[1];
  var _st=useState(3);var sets=_st[0];var setSets=_st[1];
  var _pr=useState(1);var protein=_pr[0];var setProtein=_pr[1];
  var _rl=useState([]);var recentLog=_rl[0];var setRecentLog=_rl[1];
  var _la=useState(null);var lvAnim=_la[0];var setLvAnim=_la[1];
  var _xa=useState(null);var xpAnim=_xa[0];var setXpAnim=_xa[1];
  var _ba=useState(null);var badgeAnim=_ba[0];var setBadgeAnim=_ba[1];
  var _sr=useState(false);var showReset=_sr[0];var setShowReset=_sr[1];
  var _cam=useState(false);var showCamera=_cam[0];var setShowCamera=_cam[1];
  // checkin: {photo, startTime}
  var _ci=useState(null);var checkIn=_ci[0];var setCheckIn=_ci[1];
  var _rem=useState(null);var remaining=_rem[0];var setRemaining=_rem[1];
  var badgeQueue=useRef([]);
  var timerRef=useRef(null);

  // カウントダウンタイマー
  useEffect(function(){
    if(!checkIn) return;
    function tick(){
      var left=checkIn.startTime+VALID_MS-Date.now();
      if(left<=0){setCheckIn(null);setRemaining(null);return;}
      setRemaining(left);
    }
    tick();
    timerRef.current=setInterval(tick,1000);
    return function(){clearInterval(timerRef.current);};
  },[checkIn]);

  var isActive=checkIn&&(Date.now()-checkIn.startTime<VALID_MS);

  useEffect(function(){
    var firstEx=PRESETS[part][0];
    setExercise(firstEx);
    setWeight((data.exercises[firstEx]&&data.exercises[firstEx].maxWeight)||60);
  },[part]);
  useEffect(function(){
    setWeight((data.exercises[exercise]&&data.exercises[exercise].maxWeight)||60);
  },[exercise]);

  var save=useCallback(function(d){setData(d);try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){};},[]);
  var popNextBadge=useCallback(function(){if(badgeQueue.current.length>0)setBadgeAnim(badgeQueue.current.shift());},[]);

  function onPhoto(dataUrl){
    setShowCamera(false);
    var ci={photo:dataUrl,startTime:Date.now()};
    setCheckIn(ci);
    // チェックイン数を記録
    var d=Object.assign({},data,{totalCheckIns:(data.totalCheckIns||0)+1});
    d.badges=(data.badges||[]).slice();
    var nb=[];
    BADGES.forEach(function(b){if(!d.badges.includes(b.id)&&b.cond(d)){d.badges.push(b.id);nb.push(b);}});
    save(d);
    if(nb.length>0){badgeQueue.current=badgeQueue.current.concat(nb);if(!badgeAnim)popNextBadge();}
  }

  function handleRecord(){
    if(!isActive){alert("トレーニングを開始してください！");return;}
    var today=getToday();var hour=getHour();
    var isNew=!data.exercises[exercise];
    var prevMax=(data.exercises[exercise]&&data.exercises[exercise].maxWeight)||0;
    var isPR=weight>prevMax&&!isNew;
    var xp=sets*5;var xl=[sets+"x5 +"+sets*5+"XP"];
    if(isNew){xp+=20;xl.push("しんしゅもく +20XP");}
    if(isPR){xp+=30;xl.push("じこベスト +30XP");}
    var ns=data.sessions.concat([today]);
    var streak=getStreak(ns);
    if(streak>=3&&streak>getStreak(data.sessions)){xp+=50;xl.push("れんぞく +50XP");}
    var ntxp=data.totalXP+xp;
    var prevLv=levelInfo(data.totalXP).level;
    var lv=levelInfo(ntxp).level;
    var np=Object.assign({},data.partXP);np[part]=(np[part]||0)+(sets*5);
    var ne=Object.assign({},data.exercises);
    ne[exercise]={maxWeight:Math.max(weight,prevMax),count:((ne[exercise]&&ne[exercise].count)||0)+1,part:part};
    var tds=ns.filter(function(x){return x===today;}).length;
    // workoutLog に写真+日付を保存（最新20件）
    var newLog={date:today,time:new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}),photo:checkIn?checkIn.photo:null,exercise:exercise,part:part,weight:weight,reps:reps,sets:sets,xp:xp};
    var wl=[(data.workoutLog||[])].flat();
    wl.unshift(newLog);
    if(wl.length>20) wl=wl.slice(0,20);
    var d=Object.assign({},data,{totalXP:ntxp,partXP:np,exercises:ne,sessions:ns,
      totalSessions:(data.totalSessions||0)+1,maxStreak:Math.max(data.maxStreak||0,streak),level:lv,
      prCount:(data.prCount||0)+(isPR?1:0),totalSets:(data.totalSets||0)+sets,
      maxWeight:Math.max(data.maxWeight||0,weight),maxDailySessions:Math.max(data.maxDailySessions||0,tds),
      nightRecord:data.nightRecord||(hour>=0&&hour<5),morningRecord:data.morningRecord||(hour>=5&&hour<7),
      noonRecord:data.noonRecord||(hour>=12&&hour<13),workoutLog:wl});
    d.badges=(data.badges||[]).slice();
    var nb=[];
    BADGES.forEach(function(b){if(!d.badges.includes(b.id)&&b.cond(d)){d.badges.push(b.id);nb.push(b);}});
    save(d);
    setRecentLog(function(prev){return [{exercise:exercise,part:part,weight:weight,reps:reps,sets:sets,xp:xp,xl:xl,time:new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})}].concat(prev.slice(0,9));});
    setXpAnim(xp);
    if(lv>prevLv)setTimeout(function(){setLvAnim(lv);},800);
    if(nb.length>0){badgeQueue.current=badgeQueue.current.concat(nb);if(!badgeAnim)popNextBadge();}
  }

  function handleProtein(){
