function levelInfo(xp){var lv=1,rem=xp,needed=100;while(rem>=needed){rem-=needed;lv++;needed=Math.floor(needed*1.3);}return{level:lv,current:rem,needed:needed};}
function partLevelInfo(xp){var lv=1,rem=xp,needed=50;while(rem>=needed){rem-=needed;lv++;needed=Math.floor(needed*1.4);}return{level:lv,current:rem,needed:needed};}
function getToday(){return new Date().toISOString().slice(0,10);}
function getHour(){return new Date().getHours();}
function daysDiff(a,b){return Math.floor((new Date(b)-new Date(a))/86400000);}
function getStreak(dates){if(!dates.length)return 0;var uniq=[...new Set(dates)].sort().reverse();var s=1;for(var i=0;i<uniq.length-1;i++){if((new Date(uniq[i])-new Date(uniq[i+1]))/86400000===1)s++;else break;}return s;}
function getStage(lv){if(lv<3)return 0;if(lv<6)return 1;if(lv<10)return 2;if(lv<15)return 3;return 4;}
function fmtTime(ms){var m=Math.floor(ms/60000);var s=Math.floor((ms%60000)/1000);return m+"分"+("0"+s).slice(-2)+"秒";}
function getPartForExercise(ex){var found="胸";Object.keys(PRESETS).forEach(function(p){if(PRESETS[p].indexOf(ex)>=0)found=p;});return found;}

// 退化計算
function calcDegradePenalty(lastTrainingDate){
  if(!lastTrainingDate||lastTrainingDate==="なし")return 0;
  var today=getToday();
  var diff=daysDiff(lastTrainingDate,today);
  if(diff<3)return 0;
  if(diff===3)return 15;   // 1回分相当
  if(diff===4)return 23;   // 1.5回分
  return 30*(diff-4)+23;   // 5日目以降毎日2回分
}

// ルーレット
function rollRoulette(){
  var r=Math.random();
  var cum=0;
  for(var i=0;i<ROULETTE_TABLE.length;i++){cum+=ROULETTE_TABLE[i].prob;if(r<cum)return ROULETTE_TABLE[i];}
  return ROULETTE_TABLE[0];
}

// ペンタゴンチャート（ラベル改善）
function PentagonChart(props){
  var partXP=props.partXP||{};
  var size=props.size||140;
  var cx=size/2,cy=size/2+8,r=size*0.30;
  var angles=PARTS.map(function(_,i){return(i*72-90)*Math.PI/180;});
  var maxLv=10;
  var points=PARTS.map(function(p,i){var lv=Math.min(partLevelInfo(partXP[p]||0).level,maxLv);var ratio=lv/maxLv;return[cx+r*ratio*Math.cos(angles[i]),cy+r*ratio*Math.sin(angles[i])];});
  var bgPoints=angles.map(function(a){return[cx+r*Math.cos(a),cy+r*Math.sin(a)];});
  // ラベル位置をより外側に
  var labelR=r+22;
  return h("svg",{width:size,height:size+10,style:{display:"block",overflow:"visible"}},
    h("polygon",{points:bgPoints.map(function(p){return p.join(",");}).join(" "),fill:"rgba(68,136,255,0.1)",stroke:"#4444aa",strokeWidth:1}),
    h("polygon",{points:points.map(function(p){return p.join(",");}).join(" "),fill:"rgba(255,221,0,0.25)",stroke:"#ffdd00",strokeWidth:2}),
    PARTS.map(function(p,i){
      var lv=partLevelInfo(partXP[p]||0).level;
      var tx=cx+labelR*Math.cos(angles[i]);
      var ty=cy+labelR*Math.sin(angles[i]);
      return h("g",{key:p},
        h("text",{x:tx,y:ty,textAnchor:"middle",dominantBaseline:"middle",fontSize:9,fill:PART_COLOR[p],style:{fontFamily:"'DotGothic16',monospace"}},p),
        h("text",{x:tx,y:ty+11,textAnchor:"middle",dominantBaseline:"middle",fontSize:9,fill:"#aaa",style:{fontFamily:"'DotGothic16',monospace"}},"L"+lv)
      );
    })
  );
}

// ルーレット演出
function RouletteOverlay(props){
  var _phase=useState(0);var phase=_phase[0];var setPhase=_phase[1];
  var _result=useState(null);var result=_result[0];var setResult=_result[1];
  var _idx=useState(0);var idx=_idx[0];var setIdx=_idx[1];
  var timerRef=useRef(null);
  useEffect(function(){
    var count=0,speed=80,maxCount=25;
    function spin(){
      setIdx(function(i){return(i+1)%ROULETTE_TABLE.length;});
      count++;speed=Math.min(speed+8,400);
      if(count<maxCount){timerRef.current=setTimeout(spin,speed);}
      else{var r=rollRoulette();setResult(r);setPhase(2);}
    }
    timerRef.current=setTimeout(spin,speed);
    return function(){clearTimeout(timerRef.current);};
  },[]);
  var cur=ROULETTE_TABLE[idx];
  return h("div",{style:{position:"fixed",inset:0,zIndex:2500,background:"rgba(0,0,0,0.85)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}},
    h("div",{className:"dq-win",style:{padding:"24px 32px",textAlign:"center",border:"4px solid #ffdd00",minWidth:280}},

        h("div",{style:{fontSize:13,color:"#fff",marginTop:8,marginBottom:16}},"このトレーニングの\nけいけんちが "+result.label+" になる！"),

      )

}

// バナナスワイプ画面
function BananaSwipe(props){
  var _dragging=useState(false);var dragging=_dragging[0];var setDragging=_dragging[1];
  var _x=useState(0);var x=_x[0];var setX=_x[1];
  var _done=useState(false);var done=_done[0];var setDone=_done[1];
  var startX=useRef(0);
  var trackW=260;var thumbW=60;var maxX=trackW-thumbW;

  function onStart(e){
    if(done)return;
    setDragging(true);
    startX.current=(e.touches?e.touches[0].clientX:e.clientX)-x;
  }
  function onMove(e){
    if(!dragging||done)return;
    var nx=Math.min(maxX,Math.max(0,(e.touches?e.touches[0].clientX:e.clientX)-startX.current));
    setX(nx);
    if(nx>=maxX-4){setDone(true);setDragging(false);setTimeout(function(){props.onSlide();},300);}
  }
  function onEnd(){setDragging(false);}

  return h("div",{style:{position:"fixed",inset:0,zIndex:2400,background:"rgba(0,0,0,0.88)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}},
    h("div",{className:"dq-win",style:{padding:"24px 20px",textAlign:"center",border:"4px solid #ffdd00",width:320}},
      h("div",{style:{fontSize:14,color:"#ffdd00",marginBottom:6}},"★ ゴリラのきぶんがよさそうだぞ？"),
      h("div",{style:{fontSize:11,color:"#aaa",marginBottom:20}},"バナナをスライドしてルーレットをまわせ！"),
      // スライダートラック
      h("div",{
        style:{width:trackW,height:56,background:"#000022",border:"3px solid #4444aa",borderRadius:28,margin:"0 auto",position:"relative",overflow:"hidden",cursor:"pointer"},
        onMouseDown:onStart,onMouseMove:onMove,onMouseUp:onEnd,onMouseLeave:onEnd,
        onTouchStart:onStart,onTouchMove:onMove,onTouchEnd:onEnd
      },
        // ガイドテキスト
        h("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#444",userSelect:"none",pointerEvents:"none"}},done?"":"→ →  スライド  → →"),
        // バナナつまみ
        h("div",{style:{position:"absolute",top:4,left:4+x,width:thumbW-8,height:44,borderRadius:22,background:done?"#44ff44":"#ffdd00",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,transition:dragging?"none":"transform 0.1s",userSelect:"none",pointerEvents:"none"}},done?"✓":"🍌")
      ),
      h("div",{style:{fontSize:11,color:"#666688",marginTop:12}},"さあ、うんをためせ！")
    )
  );
}
function CameraModal(props){
  var videoRef=useRef(null),canvasRef=useRef(null),streamRef=useRef(null);
  var _s=useState(false);var streaming=_s[0];var setStreaming=_s[1];

      .then(function(stream){streamRef.current=stream;if(videoRef.current){videoRef.current.srcObject=stream;videoRef.current.play();}setStreaming(true);})
      .catch(function(e){alert("カメラ起動失敗: "+e.message);props.onClose();});
    return function(){if(streamRef.current)streamRef.current.getTracks().forEach(function(t){t.stop();});};
